<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zsnix Studio - Smile One Ultimate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
    
    body {
        min-height: 100vh; display: flex; justify-content: center; align-items: center;
        background: radial-gradient(circle at center, #000b14 0%, #000000 100%);
        padding: 20px; color: white;
    }
    
    .container { width: 100%; max-width: 550px; text-align: center; }
    
    .header, .section-header {
        font-family: 'Orbitron', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase;
        background: linear-gradient(180deg, #ffffff 10%, #4facfe 50%, #0070ff 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 12px rgba(0, 191, 255, 0.7));
    }
    
    .header { font-size: 34px; margin-bottom: 5px; }
    .subheader { font-size: 14px; color: #4facfe; margin-bottom: 25px; letter-spacing: 3px; font-weight: bold; }
    .section-header { font-size: 18px; margin: 30px 0 12px 0; border-bottom: 1px solid rgba(0, 191, 255, 0.2); display: inline-block; padding: 0 20px 8px 20px; }
    
    /* GLOBAL GLOWING BORDER EFFECT */
    .glow-box {
        position: relative; overflow: hidden; border-radius: 15px;
        box-shadow: 0 0 15px rgba(0, 191, 255, 0.2); margin-bottom: 20px; z-index: 0;
    }

    .glow-box::before, .glow-box::after {
        content: ""; position: absolute; width: 160px; height: 160px;
        background: conic-gradient(#00f0ff 0%, transparent 40%, #00f0ff 50%, transparent 90%, #00f0ff 100%);
        animation: rotateGlow 3s linear infinite; z-index: -2;
    }
    .glow-box::before { top: -80px; left: -80px; }
    .glow-box::after { bottom: -80px; right: -80px; animation-delay: 1.5s; }

    /* For smaller items */
    .item-glow {
        position: relative; overflow: hidden; border-radius: 12px; z-index: 0;
        box-shadow: 0 0 10px rgba(0, 191, 255, 0.1);
    }
    .item-glow::before, .item-glow::after {
        content: ""; position: absolute; width: 80px; height: 80px;
        background: conic-gradient(#00f0ff 0%, transparent 40%, #00f0ff 50%, transparent 90%, #00f0ff 100%);
        animation: rotateGlow 3s linear infinite; z-index: -2;
    }
    .item-glow::before { top: -40px; left: -40px; }
    .item-glow::after { bottom: -40px; right: -40px; animation-delay: 1.5s; }

    @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .inner-content {
        position: relative; z-index: 1; background: rgba(0, 20, 40, 0.9);
        border-radius: inherit; width: 100%; height: 100%;
    }
    
    /* Element Specifics */
    .rate-inner { padding: 20px; }
    .rate-input {
        width: 100%; background: rgba(0,0,0,0.7); border: 2px solid #00f0ff;
        border-radius: 10px; padding: 12px; color: #fff; font-size: 26px; text-align: center;
        font-family: 'Orbitron', sans-serif; outline: none;
    }
    
    .weekly-inner { padding: 20px; }
    .weekly-title { color: #00f0ff; font-size: 20px; font-weight: 900; font-family: 'Orbitron'; text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); }

    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .item-inner { padding: 12px; text-align: left; }
    .item-name { color: #fff; font-size: 14px; font-weight: 700; display: block; text-transform: uppercase; }
    .coin-amt { color: #4facfe; font-size: 10px; display: block; margin-bottom: 5px; opacity: 0.8; }
    .price-tag { background: linear-gradient(90deg, #0052d4, #4364f7, #6fb1fc); color: #fff; font-weight: 900; font-size: 15px; padding: 5px; border-radius: 6px; display: block; text-align: center; }
    
    .copy-inner { padding: 20px; }
    .copy-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #00f0ff, #0070ff); color: #000; border: none; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-bottom: 15px; }
    .price-list-area { width: 100%; height: 200px; background: rgba(0,0,0,0.6); color: #00ff88; border: 1px solid #1e3a5f; border-radius: 10px; padding: 12px; font-size: 13px; text-align: left; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
</style>
</head>
<body>
<div class="container">
    <div class="header">Zsnix Studio</div>
    <div class="subheader">SMILE ONE CALCULATOR</div>
    
    <div class="glow-box"><div class="inner-content rate-inner">
        <label style="color:#4facfe; font-size:11px; display:block; margin-bottom:8px;">COIN RATE (1000 COINS = KS)</label>
        <input type="number" id="rateInput" class="rate-input" value="74800">
    </div></div>
    
    <div class="glow-box"><div class="inner-content weekly-inner">
        <span class="weekly-title">✨ WEEKLY DIAMOND PASS</span><br>
        <span class="coin-amt" style="text-align: center;">🪙 76 Coins</span>
        <span class="price-tag" id="weeklyPrice" style="font-size: 22px; padding: 8px;">0 Ks</span>
    </div></div>
    
    <div class="section-header">Original Prices (အရင်း)</div>
    <div class="button-grid" id="regGrid"></div>
    
    <div class="section-header">Double Diamond 2× (အရင်း)</div>
    <div class="button-grid" id="dblGrid"></div>
    
    <div class="section-header">Other Price (အရင်း)</div>
    <div class="button-grid" id="othGrid"></div>
    
    <div id="profitSections"></div>
</div>

<script>
    const regular = [[86, 61.5], [172, 122], [257, 177.5], [343, 239], [344, 244], [429, 299.5], [430, 305.5], [514, 355], [600, 416.5], [706, 480], [792, 541.5], [878, 602], [963, 657.5], [1049, 719], [1135, 779.5], [1220, 835], [1412, 960], [1584, 1082], [1669, 1137.5], [1755, 1199], [2195, 1453], [3688, 2424], [5532, 3660], [9288, 6079]];
    const double = [[50, 39], [150, 116.9], [250, 187.5], [500, 385]];
    const other = [["TWP", 402.5], ["SVP", 39], ["LVP", 12], ["WEB", 39], ["MEB", 196.5], ["ABE", 728.4], ["T3", 343.4]];
    const profits = [2, 5, 10, 15];

    function f(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

    function updateAll() {
        const rate = parseFloat(document.getElementById('rateInput').value) || 0;
        const rG = document.getElementById('regGrid');
        const dG = document.getElementById('dblGrid');
        const oG = document.getElementById('othGrid');
        const pC = document.getElementById('profitSections');
        
        rG.innerHTML = ''; dG.innerHTML = ''; oG.innerHTML = ''; pC.innerHTML = '';

        const wBase = Math.round((76/1000)*rate);
        document.getElementById('weeklyPrice').innerText = f(wBase) + " Ks";

        // Regular
        regular.forEach(d => {
            const b = Math.round((d[1]/1000)*rate);
            rG.innerHTML += `<div class="item-glow"><div class="inner-content item-inner"><span class="item-name">💎 ${d[0]} Dia</span><span class="coin-amt">🪙 ${d[1]} Coins</span><span class="price-tag">${f(b)} Ks</span></div></div>`;
        });
        // Double
        double.forEach(d => {
            const b = Math.round((d[1]/1000)*rate);
            dG.innerHTML += `<div class="item-glow"><div class="inner-content item-inner"><span class="item-name">💎 Dia(2x) ${d[0]}</span><span class="coin-amt">🪙 ${d[1]} Coins</span><span class="price-tag">${f(b)} Ks</span></div></div>`;
        });
        // Other
        other.forEach(i => {
            const b = Math.round((i[1]/1000)*rate);
            oG.innerHTML += `<div class="item-glow"><div class="inner-content item-inner"><span class="item-name">📦 ${i[0]}</span><span class="coin-amt">🪙 ${i[1]} Coins</span><span class="price-tag">${f(b)} Ks</span></div></div>`;
        });

        // Profits
        profits.forEach(p => {
            let txt = `🌟 Zsnix Studio (Profit ${p}%) 🌟\n\n✨ Weekly Pass - ${f(Math.round(wBase*(1+p/100)))} Ks\n\n--- Diamond List ---\n`;
            regular.forEach(d => txt += `${d[0]} Dia - ${f(Math.round(Math.round((d[1]/1000)*rate)*(1+p/100)))} Ks\n`);
            txt += `\n--- Double Diamond List ---\n`;
            double.forEach(d => txt += `Dia(2x) ${d[0]} - ${f(Math.round(Math.round((d[1]/1000)*rate)*(1+p/100)))} Ks\n`);
            txt += `\n--- Other Items ---\n`;
            other.forEach(i => txt += `${i[0]} - ${f(Math.round(Math.round((i[1]/1000)*rate)*(1+p/100)))} Ks\n`);
            
            pC.innerHTML += `<div class="section-header">Zsnix Studio (Profit ${p}%)</div><div class="glow-box"><div class="inner-content copy-inner"><button class="copy-btn" onclick="cp('t${p}')">📋 COPY ${p}% PRICE LIST</button><div id="t${p}" class="price-list-area">${txt}</div></div></div>`;
        });
    }

    function cp(id) { navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert("Copied!")); }
    document.getElementById('rateInput').addEventListener('input', updateAll);
    window.onload = updateAll;
</script>
</body>
</html>
